<!DOCTYPE html>
<html>
<head>
    <title>scrapbook - ashlilys</title>
    <link rel="icon" type="image/x-icon" href="a_favicon.png">
    <style>
        /* 1. Strawberry Milk Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fff5f6; }
        ::-webkit-scrollbar-thumb { background: #ffc0cb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ffb2bf; }

        /* 2. Base Styles */
        body { 
            background-color: #fff5f6;
            color: #5c4a44; 
            font-family: 'Courier New', monospace; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
            animation: fadeIn 1.2s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 3. Stationery Box */
        .content-container {
            background-color: rgba(255, 255, 255, 0.95); 
            padding: 45px;
            border-radius: 40px; 
            width: 85%;
            max-width: 500px;
            text-align: center;
            border: 4px double #ffc0cb; 
            box-shadow: 0px 15px 35px rgba(255, 192, 203, 0.4);
        }

        h1 { 
            letter-spacing: 4px; 
            margin-bottom: 20px; 
            font-size: 1.8rem; 
            color: #ff69b4;
            border-bottom: 1px dashed #ffc0cb; 
            padding-bottom: 10px; 
            display: inline-block; 
        }

        /* 4. Interactive Effects */
        .hover-effect {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 10px;
        }

        .hover-effect:hover {
            transform: scale(1.15) rotate(-3deg); 
            filter: drop-shadow(0px 0px 15px #ffc0cb);
        }

        /* 5. Pink Counter Aura & Label */
        .counter-wrapper {
            background: #fffafa;
            padding: 15px;
            border-radius: 20px;
            border: 1px dashed #ffc0cb;
            margin: 20px auto;
            display: flex;
            flex-direction: column; /* Stack label on top of numbers */
            justify-content: center;
            align-items: center;
            width: fit-content;
            transition: all 0.4s ease-in-out;
        }

        .counter-label {
            font-size: 12px;
            color: #ffb2bf;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .counter-wrapper:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ffc0cb, 0 0 40px #ffe4e8;
            background: white;
            cursor: help;
        }

        .button-link {
            display: inline-block;
            margin: 12px 6px;
            transition: all 0.3s ease;
        }

        .button-link:hover {
            transform: translateY(-5px);
        }

        a { text-decoration: none; color: #ff69b4; font-weight: bold; }
        a:hover { color: #5c4a44; text-decoration: underline; }

        footer {
            margin-top: 40px;
            padding-top: 25px;
            font-size: 13px;
            color: #a67b7b;
            border-top: 1px solid #fff0f5;
        }
    </style>
</head>
<body>
