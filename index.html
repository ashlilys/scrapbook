<!DOCTYPE html>
<html>
<head>
    <title>ashlily's scrapbook</title>
    <link rel="icon" type="image/x-icon" href="wing_favicon.png">
    <style>
        /* Matching Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fff5f6; }
        ::-webkit-scrollbar-thumb { background: #ffc0cb; border-radius: 10px; }

        body { 
            background-color: #fff5f6; 
            color: #5c4a44; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 {
            font-size: 2.5rem;
            color: #ff69b4;
            text-shadow: 2px 2px white;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #ffb2bf;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* The Enter Button */
        .enter-btn {
            display: inline-block;
            padding: 15px 40px;
            background-color: #ffc0cb;
            color: #5c4a44;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            border: 2px solid #ff69b4;
            transition: all 0.3s ease;
            box-shadow: 0px 5px 15px rgba(255, 192, 203, 0.5);
        }

        .enter-btn:hover {
            transform: scale(1.1) rotate(-2deg);
            background-color: #ffb2bf;
            box-shadow: 0px 8px 20px rgba(255, 192, 203, 0.7);
        }

        /* Floating Wings/Sparkles Decoration */
        .decor {
            font-size: 40px;
            margin: 20px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="decor">ʚ♡ɞ</div>
        <h1>ashlily's scrapbook</h1>
        <p class="subtitle">welcome to my little world...</p>
        
        <a href="counter.html" class="enter-btn">ENTER ✨</a>
        
        <br><br>
        <div class="decor" style="animation-delay: 1.5s;">✧˖°.</div>
    </div>
</body>
</html>
