<!DOCTYPE html>
<html>
<head>
    <title>ashlilys's scrapbook</title>
    <style>
        /* 1. Custom Scrollbar - Strawberry Milk Style */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fff5f6; }
        ::-webkit-scrollbar-thumb { background: #ffc0cb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ffb2bf; }

        /* 2. Base Styles & Entry Animation */
        body { 
            background-color: #fff5f6 !important; /* Slightly pinker than Pocket Beats */
            color: #5c4a44 !important; 
            font-family: "Courier New", Courier, monospace; 
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 3. Layout Styles - The "Stationery" Box */
        .content-container {
            background-color: rgba(255, 255, 255, 0.95); 
            padding: 45px;
            border-radius: 40px; 
            width: 85%;
            max-width: 500px;
            text-align: center;
            margin: 60px 0; 
            /* Double border makes it look more like a scrapbook/paper */
            border: 4px double #ffc0cb; 
            box-shadow: 0px 15px 35px rgba(255, 192, 203, 0.4);
        }

        h1 { 
            letter-spacing: 4px; 
            margin-bottom: 20px; 
            font-size: 1.8rem; 
            color: #ff69b4; /* Brighter pink for the title */
            border-bottom: 1px dashed #ffc0cb; 
            padding-bottom: 10px; 
            display: inline-block; 
        }

        /* 4. Interactive Effects */
        .hover-effect {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hover-effect:hover {
            transform: scale(1.15) rotate(-3deg); 
            filter: drop-shadow(0px 0px 15px #ffc0cb);
        }

        .button-link {
            display: inline-block;
            margin: 12px 6px;
            transition: all 0.3s ease;
        }

        .button-link:hover {
            transform: translateY(-8px);
            filter: brightness(1.05);
        }

        a { text-decoration: none; color: #ff69b4; font-weight: bold; }
        a:hover { color: #5c4a44; text-decoration: underline; }

        footer {
            margin-top: 40px;
            padding-top: 25px;
            font-size: 13px;
            color: #a67b7b;
            border-top: 1px solid #fff0f5;
        }
    </style>
</head>
<body>
