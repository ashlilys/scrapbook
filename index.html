<!DOCTYPE html>
<html>
<head>
    <title>visitor log</title>
    <link rel="icon" type="image/x-icon" href="wing_favicon.png">
    <style>
        /* 1. Matching Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fff5f6; }
        ::-webkit-scrollbar-thumb { background: #ffc0cb; border-radius: 10px; }

        /* 2. Soft Pink Background */
        body { 
            background-color: #fff5f6; 
            color: #5c4a44; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            animation: fadeIn 1.2s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 3. The Card */
        .stats-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 40px;
            border: 4px double #ffc0cb;
            box-shadow: 0px 15px 35px rgba(255, 192, 203, 0.4);
            text-align: center;
            width: 350px;
        }

        h3 { color: #ff69b4; letter-spacing: 2px; }

        /* 4. FIXED: Centered Box with Aura */
        .counter-wrapper {
            background: #fffafa;
            padding: 20px;
            border-radius: 20px;
            border: 1px dashed #ffc0cb;
            margin: 15px auto;
            
            /* Magic Centering */
            display: inline-flex;
            justify-content: center;
            align-items: center;
            
            min-width: 180px;
            transition: all 0.4s ease-in-out;
        }

        .counter-wrapper:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ffc0cb, 0 0 40px #ffe4e8;
            background: white;
        }

        /* 5. Return Button */
        .return-button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ffc0cb;
            color: #5c4a44; 
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
            box-shadow: 0px 4px 0px #eecad0;
        }

        .return-button:hover {
            transform: translateY(-3px);
            box-shadow: 0px 6px 0px #eecad0;
            background-color: #ffb2bf;
        }
    </style>
</head>
<body>
    <div class="stats-card">
        <h3>total views:</h3>
        <p style="color: #ffb2bf;">⏔⏔⏔ ꒰ ᧔ෆ᧓ ꒱ ⏔⏔⏔</p>
        
        <div class="counter-wrapper">
            <a href="https://www.freecounterstat.com" title="website counter">
                <img src="https://counter9.optistats.ovh/private/freecounterstat.php?c=8zllm6p6jex99t144n894m9u29pne8un" border="0" title="website counter" alt="website counter">
            </a>
        </div>
        
        <br>
        <a href="index.html" class="return-button">← return to scrapbook</a>
    </div>
</body>
</html>
