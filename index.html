<!DOCTYPE html>
<html>
<head>
    <title>ashlilys's scrapbook</title>
    <style>
        /* 1. Custom Scrollbar (Pocket Beats Style) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fdf6f3; }
        ::-webkit-scrollbar-thumb { background: #eecad0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d4a5a9; }

        /* 2. Base Styles & Entry Animation */
        body { 
            background-color: #fdf6f3 !important; 
            color: #5c4a44 !important; 
            font-family: "Courier New", Courier, monospace; 
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            animation: fadeIn 1.2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 3. Layout Styles (The White Rounded Box) */
        .content-container {
            background-color: rgba(255, 255, 255, 0.9); 
            padding: 40px;
            border-radius: 30px; /* Extra round like Pocket Beats */
            width: 85%;
            max-width: 500px;
            text-align: center;
            margin: 60px 0; 
            box-shadow: 0px 10px 30px rgba(238, 202, 208, 0.3); /* Soft pink glow shadow */
            border: 1px solid rgba(255, 192, 203, 0.3);
        }

        h1 { 
            letter-spacing: 3px; 
            margin-bottom: 20px; 
            font-size: 2rem; 
            color: #5c4a44; 
            border-bottom: 2px solid #eecad0; 
            padding-bottom: 10px; 
            display: inline-block; 
        }

        /* 4. Hover Animations for Buttons/Pusheen */
        .hover-effect {
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        .hover-effect:hover {
            transform: scale(1.1) rotate(2deg); 
            filter: drop-shadow(0px 0px 10px #eecad0);
            cursor: pointer;
        }

        .button-link {
            display: inline-block;
            margin: 10px 5px;
            transition: transform 0.3s ease;
        }

        .button-link:hover {
            transform: translateY(-5px); /* Button floats up slightly */
        }

        a { text-decoration: none; color: #d4a5a9; font-weight: bold; }
        a:hover { color: #a67b7b; }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            font-size: 12px;
            color: #a67b7b;
            border-top: 1px dashed #eecad0;
        }
    </style>
</head>
<body>
