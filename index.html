<!DOCTYPE html>

<head>
    <title>ashlilys's scrapbook</title>
    <link rel="icon" type="image/x-icon" href="a_favicon.png">
    <style>
        /* 1. Custom Scrollbar - Strawberry Milk Style */
        /* 1. Matching Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fff5f6; }
        ::-webkit-scrollbar-thumb { background: #ffc0cb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ffb2bf; }

        /* 2. Base Styles & Entry Animation */
        /* 2. Soft Pink Background */
        body { 
            background-color: #fff5f6 !important; /* Slightly pinker than Pocket Beats */
            color: #5c4a44 !important; 
            font-family: "Courier New", Courier, monospace; 
            background-color: #fff5f6; 
            color: #5c4a44; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            animation: fadeIn 1.5s ease-in;
            animation: fadeIn 1.2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 3. Layout Styles - The "Stationery" Box */
        .content-container {
            background-color: rgba(255, 255, 255, 0.95); 
            padding: 45px;
            border-radius: 40px; 
            width: 85%;
            max-width: 500px;
            text-align: center;
            margin: 60px 0; 
            /* Double border makes it look more like a scrapbook/paper */
            border: 4px double #ffc0cb; 
        /* 3. The Card */
        .stats-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 40px;
            border: 4px double #ffc0cb;
            box-shadow: 0px 15px 35px rgba(255, 192, 203, 0.4);
            text-align: center;
            width: 350px;
        }

        h1 { 
            letter-spacing: 4px; 
            margin-bottom: 20px; 
            font-size: 1.8rem; 
            color: #ff69b4; /* Brighter pink for the title */
            border-bottom: 1px dashed #ffc0cb; 
            padding-bottom: 10px; 
            display: inline-block; 
        }
        h3 { color: #ff69b4; letter-spacing: 2px; }

        /* 4. Interactive Effects */
        .hover-effect {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        /* 4. Centered White Box with Pink Aura */
        .counter-wrapper {
            background: #fffafa;
            padding: 20px;
            border-radius: 20px;
            border: 1px dashed #ffc0cb;
            margin: 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50px;
            transition: all 0.4s ease-in-out;
        }

        .hover-effect:hover {
            transform: scale(1.15) rotate(-3deg); 
            filter: drop-shadow(0px 0px 15px #ffc0cb);
        .counter-wrapper:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ffc0cb, 0 0 40px #ffe4e8;
            background: white;
        }

        .button-link {
        /* 5. Return Button */
        .return-button {
            display: inline-block;
            margin: 12px 6px;
            transition: all 0.3s ease;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ffc0cb;
            color: #5c4a44; 
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
            box-shadow: 0px 4px 0px #eecad0;
        }

        .button-link:hover {
            transform: translateY(-8px);
            filter: brightness(1.05);
        }

        a { text-decoration: none; color: #ff69b4; font-weight: bold; }
        a:hover { color: #5c4a44; text-decoration: underline; }

        footer {
            margin-top: 40px;
            padding-top: 25px;
            font-size: 13px;
            color: #a67b7b;
            border-top: 1px solid #fff0f5;
        .return-button:hover {
            transform: translateY(-3px);
            box-shadow: 0px 6px 0px #eecad0;
            background-color: #ffb2bf;
        }
    </style>
</head>
<body>
