<!DOCTYPE html>
<html>
<head>
    <title>visitor log</title>
    <style>
        /* 1. Matching Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fff5f6; }
        ::-webkit-scrollbar-thumb { background: #ffc0cb; border-radius: 10px; }

        /* 2. Soft Pink Background & Animation */
        body { 
            background-color: #fff5f6; 
            color: #5c4a44; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            animation: fadeIn 1.2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 3. The "Pocket Beats" Style Card */
        .stats-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 40px;
            border: 4px double #ffc0cb;
            box-shadow: 0px 15px 35px rgba(255, 192, 203, 0.4);
            text-align: center;
            max-width: 300px;
        }

        h3 { 
            margin-top: 0; 
            letter-spacing: 2px; 
            color: #ff69b4;
            font-size: 1.2rem;
        }

        .counter-wrapper {
            background: #fffafa;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
            border: 1px dashed #ffc0cb;
            margin: 20px 0;
        }

        a {
            text-decoration: none;
            color: #a67b7b;
            font-size: 14px;
            transition: 0.3s;
        }

        a:hover {
            color: #ff69b4;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="stats-card">
        <h3>total views:</h3>
        <p>⏔⏔⏔ ꒰ ᧔ෆ᧓ ꒱ ⏔⏔⏔</p>
        <div class="counter-wrapper">
            <img src="https://counter9.optistats.ovh/private/freecounterstat.php?c=gumvpxkx" title="free counter" alt="visitor counter" border="0">
        </div>
        
        <br><br>
        <a href="index.html">[ return to scrapbook ]</a>
    </div>
</body>
</html>
