<!DOCTYPE html>
<html>
<head>
    <title>visitor log</title>
    <link rel="icon" type="image/x-icon" href="wing_favicon.png">
    <style>
        /* 1. Matching Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fff5f6; }
        ::-webkit-scrollbar-thumb { background: #ffc0cb; border-radius: 10px; }

        /* 2. Soft Pink Background & Animation */
        body { 
            background-color: #fff5f6; 
            color: #5c4a44; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            animation: fadeIn 1.2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 3. The "Pocket Beats" Style Card */
        .stats-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 40px;
            border: 4px double #ffc0cb;
            box-shadow: 0px 15px 35px rgba(255, 192, 203, 0.4);
            text-align: center;
            width: 320px;
        }

        h3 { 
            margin-top: 0; 
            letter-spacing: 2px; 
            color: #ff69b4;
            font-size: 1.2rem;
        }

        /* 4. Centered Counter Box with Hover Aura */
        .counter-wrapper {
            background: #fffafa;
            padding: 20px;
            border-radius: 20px;
            display: flex; /* Centers the image inside */
            justify-content: center;
            align-items: center;
            border: 1px dashed #ffc0cb;
            margin: 10px auto;
            width: fit-content; /* Hugs the counter image tightly */
            min-width: 200px;
            transition: all 0.5s ease;
        }

        /* The Pink Aura Animation */
        .counter-wrapper:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ffc0cb, 0 0 40px #ffdae0;
            border: 1px solid #ff69b4;
            background: white;
        }

        /* 5. Softened Return Button */
        .return-button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ffc0cb;
            color: #5c4a44; 
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.3s ease;
            box-shadow: 0px 4px 0px #eecad0;
        }

        .return-button:hover {
            transform: translateY(-3px);
            box-shadow: 0px 6px 0px #eecad0;
            background-color: #ffb2bf;
        }

        .return-button:active {
            transform: translateY(2px);
            box-shadow: 0px 0px 0px #eecad0;
        }
    </style>
</head>
<body>
    <div class="stats-card">
        <h3>total views:</h3>
        <p style="color: #ffb2bf;">⏔⏔⏔ ꒰ ᧔ෆ᧓ ꒱ ⏔⏔⏔</p>
        
        <div class="counter-wrapper">
            <img src="https://count.getloli.com/get/@ashlilys-scrapbook?theme=asoul" alt="visitor counter">
        </div>
        
        <br>
        <a href="index.html" class="return-button">← return to scrapbook</a>
    </div>
</body>
</html>
